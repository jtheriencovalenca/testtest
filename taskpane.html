<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https://appsforoffice.microsoft.com https://ajax.aspnetcdn.com;
             script-src 'self' https://appsforoffice.microsoft.com https://ajax.aspnetcdn.com;
             style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
             font-src https://fonts.gstatic.com;
             connect-src 'self' https://covalenca.sharepoint.com https://login.microsoftonline.com;
             frame-src 'self' https://covalenca.sharepoint.com;
             img-src 'self' data: https:;"/>
  <title>Email Templates</title>

  <!-- Office.js — must load from Microsoft CDN -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="taskpane.css"/>
</head>
<body>

  <div id="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-inner">
        <span class="header-logo">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="3" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M1 6l8 5 8-5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="header-title">Email Templates</span>
        <button class="refresh-btn" id="refreshBtn" title="Refresh templates">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12.5 7A5.5 5.5 0 1 1 7 1.5c1.8 0 3.4.87 4.4 2.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M11 1.5l.5 2.2-2.2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── Search ── -->
    <div class="search-bar">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search templates…" autocomplete="off"/>
    </div>

    <!-- ── Category filter ── -->
    <div class="category-bar" id="categoryBar">
      <button class="cat-pill active" data-cat="All">All</button>
    </div>

    <!-- ── Template list ── -->
    <main class="template-list" id="templateList">
      <div class="state-loading" id="stateLoading">
        <div class="spinner"></div>
        <p>Loading templates…</p>
      </div>
      <div class="state-empty hidden" id="stateEmpty">
        <p>No templates found.</p>
      </div>
      <div class="state-error hidden" id="stateError">
        <p id="stateErrorMsg">Could not load templates.</p>
        <button class="retry-btn" id="retryBtn">Try again</button>
      </div>
    </main>

    <!-- ── Preview drawer ── -->
    <div class="preview-overlay hidden" id="previewOverlay">
      <div class="preview-drawer" id="previewDrawer">
        <div class="preview-header">
          <span class="preview-title" id="previewTitle">Preview</span>
          <button class="preview-close" id="previewClose">✕</button>
        </div>
        <div class="preview-body" id="previewBody">
          <div class="spinner"></div>
        </div>
        <div class="preview-footer">
          <button class="btn-secondary" id="previewCancel">Cancel</button>
          <button class="btn-primary" id="previewInsert">Insert template</button>
        </div>
      </div>
    </div>

    <!-- ── Toast ── -->
    <div class="toast hidden" id="toast"></div>

  </div>

  <script src="taskpane.js"></script>
</body>
</html>
